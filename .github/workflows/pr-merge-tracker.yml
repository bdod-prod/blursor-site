name: PR Merge Tracker

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  notify-merged:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'auto/')
    runs-on: ubuntu-latest
    steps:
      - name: Notify n8n
        run: |
          SLUG="${HEAD_REF#auto/}"
          curl -sS -X POST "https://n8n.bdod.cc/webhook/blursor-pr-merged" \
            -H "Content-Type: application/json" \
            -d "{
              \"slug\": \"${SLUG}\",
              \"pr_number\": ${PR_NUMBER},
              \"merged_at\": \"${MERGED_AT}\",
              \"pr_url\": \"${PR_URL}\"
            }"
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_URL: ${{ github.event.pull_request.html_url }}
